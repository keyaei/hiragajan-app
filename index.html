<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ひらがじゃん判定</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>ひらがじゃん判定</h1>
    <p class="description">
      手牌・自摸牌・相手の捨て牌から、ツモ / ロン / ポン / カン / 打牌候補を表示します。
    </p>

    <section class="card">
      <label for="hand">手牌</label>
      <textarea
        id="hand"
        rows="4"
        placeholder="例: あ し た さ か な と た ん ま ぐ"
      ></textarea>

      <label for="draw">自摸牌</label>
      <input
        id="draw"
        type="text"
        placeholder="例: ろ"
      >

      <label for="discards">相手の捨て牌</label>
      <textarea
        id="discards"
        rows="3"
        placeholder="例: ろ ん き"
      ></textarea>

      <label class="checkbox-line">
        <input id="isOpenHand" type="checkbox">
        すでに鳴いている
      </label>

      <button id="judgeBtn" type="button">判定する</button>
    </section>

    <section class="card">
      <h2>結果</h2>
      <pre id="result">ここに判定結果が表示されます。</pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
